# CI: lint (ruff) + test unit offline su tutte le Python supportate.
# Gli integration test (che toccano Internet Archive reale) restano esclusi:
# pyproject li deseleziona di default e in CI non avrebbero credenziali ne'
# tempi prevedibili — si lanciano a mano con `make test-integration`.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installa il package con le dipendenze dev
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src tests

      - name: Test unit (offline) con gate di copertura al 100%
        run: |
          python -m coverage run -m pytest
          python -m coverage report
